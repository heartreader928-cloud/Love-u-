<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Card</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  color:white;
  overflow:hidden;
  background: linear-gradient(135deg, #1a0033, #330033, #660033);
}

.page {
  display:none;
  height:100vh;
  width:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:20px;
  position:relative;
}
.active { display:flex; }

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

/* ⭐ STARS */
.star {
  position:absolute;
  font-size:10px;
  opacity:0.5;
}

/* ❤️ HEART FALL */
.heart {
  position:absolute;
  font-size:18px;
  animation: fall linear forwards;
  filter: drop-shadow(0 0 6px pink);
}

@keyframes fall {
  0% { transform: translateY(-100vh); }
  100% { transform: translateY(80vh); }
}

/* ❤️ FIXED HEART (GLOW) */
.fixed-heart {
  position:absolute;
  bottom:0;
  font-size:16px;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  0% { filter: drop-shadow(0 0 5px pink); }
  100% { filter: drop-shadow(0 0 15px red); }
}

/* 💥 BURST PARTICLES */
.particle {
  position:absolute;
  font-size:12px;
  animation: burst 1s forwards;
}

@keyframes burst {
  0% { transform: scale(1); opacity:1; }
  100% {
    transform: translate(var(--x), var(--y)) scale(0.5);
    opacity:0;
  }
}

/* 🎉 CONFETTI */
.confetti div {
  position:absolute;
  width:6px;
  height:6px;
  background:white;
  animation: drop 3s linear infinite;
}
@keyframes drop {
  0% { transform: translateY(-100vh); }
  100% { transform: translateY(100vh); }
}
</style>
</head>

<body>

<!-- PAGES -->
<div class="page active" id="p1">
  <h2 id="t1"></h2>
  <p id="t2"></p>
  <button onclick="nextPage(2)">Next</button>
</div>

<div class="page" id="p2">
  <h3 id="t3"></h3>
  <p>Kaisa laga mere saath rehkr?</p>
  <button onclick="wrong()">Accha</button>
  <button onclick="wrong()">Bohot bekar</button>
  <button onclick="wrong()">Best</button>
  <button onclick="nextPage(3)">I can't express ❤️</button>
</div>

<div class="page" id="p3">
  <h3>Gift chahiye?? 🎁</h3>
  <button id="yes" onclick="tapYes()">YES</button>
  <button onclick="growYes()">NO</button>
</div>

<div class="page" id="p4">
  <div id="confetti"></div>
  <h2 id="t4"></h2>
  <p id="t5"></p>
  <button id="next4" style="display:none;" onclick="nextPage(5)">Next</button>
</div>

<div class="page" id="p5">
  <h2 id="t6"></h2>
</div>

<script>

/* PAGE SWITCH */
function nextPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('p'+n).classList.add('active');
  runTyping(n);
}

/* TYPING */
function type(el,text,speed=30){
  el.innerHTML="";
  let i=0;
  function t(){
    if(i<text.length){
      el.innerHTML+=text[i++];
      setTimeout(t,speed);
    }
  }
  t();
}

function runTyping(p){
  if(p==1){
    type(t1,"Hello it's your best friend Sameer 🎁");
    setTimeout(()=>type(t2,"A small gift for u"),1000);
  }
  if(p==2){
    type(t3,"Sorry bro birthday ke din kuch diya nahi 😅");
  }
  if(p==4){
    type(t4,"🎉 Happy Birthday Prince 🎉");
    type(t5,
`Mera bhai hai tu 🤭
Tere saath bohot maza aata hai
Tere parents khush rahe
Tu successful ho life me

Love life thodi kharab hai 😆 koi na
Believe in God plans 🙏

Hamesha khush rehna
Kuch hoga to batana
Main hu tere liye hamesha 💙

Sorry block ki dhamkiyon ke liye 😭`,10);

    setTimeout(()=>next4.style.display='block',10000);
  }
  if(p==5){
    type(t6,"THANK YOU ❤️");
  }
}
runTyping(1);

/* YES GAME */
let taps=0;
function tapYes(){
  taps++;
  yes.style.transform=`scale(${1+taps})`;
  if(taps>=7) nextPage(4);
}
function growYes(){
  yes.style.transform="scale(2)";
}
function wrong(){ alert("Sach bol 😏"); }

/* ⭐ STARS */
for(let i=0;i<40;i++){
  let s=document.createElement("div");
  s.className="star";
  s.innerHTML="⭐";
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*100+"%";
  document.body.appendChild(s);
}

/* ❤️ HEART FALL + STACK */
let stack=0;
function createHeart(){
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"%";
  h.style.animationDuration=(Math.random()*1+1)+"s";
  document.body.appendChild(h);

  setTimeout(()=>{
    h.remove();
    let f=document.createElement("div");
    f.className="fixed-heart";
    f.innerHTML="❤️";
    f.style.left=Math.random()*100+"%";
    f.style.bottom=stack*2+"px";
    document.body.appendChild(f);
    stack++;
  },1000);
}
setInterval(createHeart,300);

/* 💥 TOUCH BURST */
document.addEventListener("click", (e)=>{
  for(let i=0;i<10;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.innerHTML="💖";
    p.style.left=e.clientX+"px";
    p.style.top=e.clientY+"px";

    let x=(Math.random()*200-100)+"px";
    let y=(Math.random()*200-100)+"px";
    p.style.setProperty("--x",x);
    p.style.setProperty("--y",y);

    document.body.appendChild(p);

    setTimeout(()=>p.remove(),1000);
  }
});

/* 🎉 CONFETTI */
let conf=document.getElementById("confetti");
for(let i=0;i<40;i++){
  let d=document.createElement("div");
  d.style.left=Math.random()*100+"%";
  d.style.animationDuration=(Math.random()*3+2)+"s";
  conf.appendChild(d);
}

</script>

</body>
  </html>
